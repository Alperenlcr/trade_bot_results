<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FFNNFDNLZQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-FFNNFDNLZQ');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="icon" type="image/png" href="./favicon.png?v=1">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-header-text">
                <h1 data-i18n="pageTitle"></h1>
                <p data-i18n="pageSubtitle"></p>
            </div>
            <div class="header-divider"></div>
            <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">
                <span class="lang-active" id="langActive"></span>
                <span class="lang-sep">|</span>
                <span class="lang-inactive" id="langInactive"></span>
            </button>
        </div>
        <!-- Equity Chart Section -->
        <div class="equity-section">
            <div class="equity-card">
                <div class="equity-header">
                    <div class="equity-title"><span class="help-icon" data-help-key="equityCurve" style="margin-right:4px;vertical-align:middle;font-size:0.82rem">?<span class="help-tooltip"></span></span><span data-i18n="equityCurveTitle"></span></div>
                    <div class="equity-subtitle" id="equitySubtitle" style="padding-left:32px"></div>
                </div>
                <div class="equity-canvas-wrap">
                    <canvas id="equityChart"></canvas>
                    <canvas id="equityOverlay"></canvas>
                    <div class="equity-sel-stats" id="equitySelStats"></div>
                </div>
                <div class="equity-period-btns">
                    <button class="equity-period-btn" data-months="3"><span class="epb-label" data-i18n="btn3M"></span><span class="epb-roi-port"></span><span class="epb-roi-btc"></span></button>
                    <button class="equity-period-btn" data-months="6"><span class="epb-label" data-i18n="btn6M"></span><span class="epb-roi-port"></span><span class="epb-roi-btc"></span></button>
                    <button class="equity-period-btn active" data-months="12"><span class="epb-label" data-i18n="btn1Y"></span><span class="epb-roi-port"></span><span class="epb-roi-btc"></span></button>
                    <button class="equity-period-btn" data-months="36"><span class="epb-label" data-i18n="btn3Y"></span><span class="epb-roi-port"></span><span class="epb-roi-btc"></span></button>
                    <button class="equity-period-btn" data-months="60"><span class="epb-label" data-i18n="btn5Y"></span><span class="epb-roi-port"></span><span class="epb-roi-btc"></span></button>
                    <button class="equity-period-btn" data-months="0"><span class="epb-label" data-i18n="btnAll"></span><span class="epb-roi-port"></span><span class="epb-roi-btc"></span></button>
                </div>
            </div>
        </div>
        <div id="equityTooltip" class="equity-tooltip"></div>

        <!-- Main Content Layout -->
        <div class="main-layout">
            <!-- Tables Column (BP + PA) -->
            <div class="tables-column">
                <!-- Performance Analysis Section -->
                <div class="date-section">
                    <h3 data-i18n="sectionPA"></h3>
                    <div class="slider-group">
                        <div class="date-labels">
                            <span class="date-range-inline-label bp-row-label">
                                <span data-i18n="dateRange"></span>
                            </span>
                            <span class="slider-value" id="startDateLabel">-</span>
                            <span class="slider-value" id="endDateLabel">-</span>
                        </div>
                        <div class="range-slider-container">
                            <input type="range" class="range-slider range-slider-min" id="startSlider" min="0" max="100" value="0">
                            <input type="range" class="range-slider range-slider-max" id="endSlider" min="0" max="100" value="100">
                        </div>

                        <div class="rolling-controls">
                            <label class="bp-row-label" for="periodSelect"><span class="help-icon" data-help-key="rollingPeriod">?
                                    <span class="help-tooltip"></span>
                                </span><span data-i18n="rollingPeriod"></span>
                            </label>
                            <select id="periodSelect">
                                <option value="30" data-i18n="period30"></option>
                                <option value="90" data-i18n="period90"></option>
                                <option value="180" data-i18n="period180"></option>
                                <option value="365" selected data-i18n="period365"></option>
                                <option value="730" data-i18n="period730"></option>
                            </select>
                        </div>
                        <!-- Performance metrics table (title is the section h3 above) -->
                        <div id="executorResults" data-no-title="1">
                            <div class="loading" data-i18n="loadingPerf"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Trading History Column (TP, spans rows) -->
            <div class="history-column">
                <div class="history-section" id="tradingHistory">
                    <div class="history-title" data-i18n="tradePositions"></div>
                    <div class="csv-table-container">
                        <table class="csv-table" id="csvTable">
                            <thead id="csvTableHead">
                                <tr><td colspan="100%" style="text-align: center; padding: 20px;" data-i18n="loadingTrades"></td></tr>
                            </thead>
                            <tbody id="csvTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Bot Specifications Column (BS, spans rows) -->
            <div class="additional-boxes">
                <!-- Bot Specifications -->
                <div class="bot-specs">
                    <div class="box-title" data-i18n="infoNotes"></div>
                    <textarea 
                        class="specs-textarea" 
                        id="botSpecs" 
                        readonly></textarea>

                </div>
            </div>
        </div>
    </div>

    <!-- Copy Trading Section -->
    <div class="copy-trade-section">
        <div class="copy-trade-cards">
            <!-- Binance -->
            <a class="copy-trade-card copy-trade-card--binance"
               href="https://www.binance.com/copy-trading/lead-details/4965482140792366337?ref=1116146315"
               onclick="gtag('event', 'binance_referral_click', {'event_category': 'outbound', 'event_label': 'binance_referral'});"
               target="_blank" rel="noopener noreferrer">
                <div class="ctc-glow ctc-glow--binance"></div>
                <div class="ctc-logo-wrap">
                    <img src="./assets/images/binance_logo.png" alt="Binance" class="ctc-logo">
                </div>
                <div class="ctc-body">
                    <div class="ctc-platform">Binance · Copy Trade</div>
                    <div class="ctc-cta" data-i18n="copyTradeCta"></div>
                </div>
                <div class="ctc-arrow">&#10132;</div>
            </a>
            <!-- Bybit -->
            <a class="copy-trade-card copy-trade-card--bybit"
               href="https://bybit.onelink.me/EhY6/rfp1pitn"
               onclick="gtag('event', 'bybit_referral_click', {'event_category': 'outbound', 'event_label': 'bybit_referral'});"
               target="_blank" rel="noopener noreferrer">
                <div class="ctc-glow ctc-glow--bybit"></div>
                <div class="ctc-logo-wrap">
                    <img src="./assets/images/bybit_logo.png" alt="Bybit" class="ctc-logo">
                </div>
                <div class="ctc-body">
                    <div class="ctc-platform">Bybit · Copy Trade</div>
                    <div class="ctc-cta" data-i18n="copyTradeCta"></div>
                </div>
                <div class="ctc-arrow">&#10132;</div>
            </a>
        </div>
    </div>

    <!-- Referral Section -->
    <div class="referral-section">
        <div class="referral-card">
            <div class="referral-glow"></div>
            <div class="referral-icon">&#128101;</div>
            <div class="referral-body">
                <div class="referral-title" data-i18n="referralTitle"></div>
                <div class="referral-desc" data-i18n="referralDesc"></div>
            </div>
            <a class="referral-btn"
               href="https://forms.gle/aDjb3LyWasFouUf76"
               onclick="gtag('event', 'referral_click', {'event_category': 'outbound', 'event_label': 'referral_form'});"
               target="_blank" rel="noopener noreferrer">
                <span data-i18n="referralCta"></span>
                <span class="referral-arrow">&#10132;</span>
            </a>
        </div>
    </div>

    <!-- Photo Slider Section -->
    <div class="photo-slider-section">
        <div class="photo-slider-card">
            <div class="box-title" data-i18n="sliderTitle"></div>
            <div class="slider-guide-tip">
                <span class="slider-guide-icon">&#127916;</span>
                <span class="slider-guide-text" data-i18n="sliderGuideText"></span>
                <a class="slider-guide-btn" href="https://www.youtube.com/watch?v=5JZoTzN0IsE" target="_blank" rel="noopener noreferrer"
                   onclick="gtag('event', 'beginner_guide_click', {'event_category': 'outbound', 'event_label': 'binance_deposit_guide'});">
                    <span data-i18n="sliderGuideBtn"></span>
                    <span class="slider-guide-arrow">&#10132;</span>
                </a>
            </div>
            <div class="photo-slider-wrapper">
                <div class="photo-slider-track" id="photoSliderTrack">
                    <div class="photo-slide"><img src="./assets/images/1.jpeg" alt="Step 1" draggable="false"></div>
                    <div class="photo-slide"><img src="./assets/images/2.jpeg" alt="Step 2" draggable="false"></div>
                    <div class="photo-slide"><img src="./assets/images/3.jpeg" alt="Step 3" draggable="false"></div>
                    <div class="photo-slide"><img src="./assets/images/4.jpeg" alt="Step 4" draggable="false"></div>
                    <div class="photo-slide"><img src="./assets/images/5.jpeg" alt="Step 5" draggable="false"></div>
                    <div class="photo-slide"><img src="./assets/images/6.jpeg" alt="Step 6" draggable="false"></div>
                    <div class="photo-slide"><img src="./assets/images/7.jpeg" alt="Step 7" draggable="false"></div>
                </div>
                <button class="photo-slider-btn photo-slider-prev" id="photoSliderPrev" aria-label="Previous">&#10094;</button>
                <button class="photo-slider-btn photo-slider-next" id="photoSliderNext" aria-label="Next">&#10095;</button>
            </div>
            <div class="photo-slider-dots" id="photoSliderDots">
                <span class="photo-slider-dot active" data-idx="0"></span>
                <span class="photo-slider-dot" data-idx="1"></span>
                <span class="photo-slider-dot" data-idx="2"></span>
                <span class="photo-slider-dot" data-idx="3"></span>
                <span class="photo-slider-dot" data-idx="4"></span>
                <span class="photo-slider-dot" data-idx="5"></span>
                <span class="photo-slider-dot" data-idx="6"></span>
            </div>
        </div>
    </div>

    <!-- Rolling Window Explanation Modal -->
    <div class="rw-modal-overlay" id="rwModal">
        <div class="rw-modal-box">
            <button class="rw-modal-close" id="rwModalClose">&#x2715;</button>
            <img class="rw-modal-img" src="./rolling_window_eng.png" alt="">
        </div>
    </div>

    <script src="./assets/js/main.js?v=2"></script>
</body>
</html>
